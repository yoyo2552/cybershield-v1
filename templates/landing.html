<!DOCTYPE html>
<html>
<head>
    <title>CyberShield AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#0b1220;
            color:white;
        }

        .navbar{
            display:flex;
            justify-content:space-between;
            padding:20px;
            background:#0f172a;
        }

        .btn{
            padding:10px 18px;
            background:#4f46e5;
            color:white;
            text-decoration:none;
            border-radius:10px;
            margin-left:10px;
        }

        .hero{
            text-align:center;
            padding:100px 20px;
        }

        .hero h1{
            font-size:50px;
        }

        .features{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            margin-top:50px;
        }

        .card{
            background:#111827;
            padding:20px;
            margin:10px;
            border-radius:15px;
            width:250px;
        }

        .cta{
            text-align:center;
            margin-top:80px;
            padding-bottom:80px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>🛡️ CyberShield AI</h2>
    <div>
        <a href="/login" class="btn">Login</a>
        <a href="/signup" class="btn">Signup</a>
    </div>
</div>

<div class="hero">
    <h1>AI Phishing Protection</h1>
    <p>Detect scams and malicious messages instantly.</p>
    <a href="/signup" class="btn">Start Free</a>
</div>

<div class="features">

    <div class="card">
        <h3>⚡ AI Detection</h3>
        <p>Analyse intelligente des messages.</p>
    </div>

    <div class="card">
        <h3>🔐 Secure</h3>
        <p>Login sécurisé utilisateur.</p>
    </div>

    <div class="card">
        <h3>📊 Risk Score</h3>
        <p>Score phishing 0 à 100.</p>
    </div>

</div>

<div class="cta">
    <h2>Start protecting your app</h2>
    <a href="/signup" class="btn">Create Account</a>
</div>

</body>
</html>
